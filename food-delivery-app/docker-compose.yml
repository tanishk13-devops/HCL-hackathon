version: '3.8'

services:
  fooddelivery-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7001:7001"
      - "80:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=fooddeliverydb;Username=postgres;Password=postgres
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - fooddelivery-api

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fooddeliverydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
