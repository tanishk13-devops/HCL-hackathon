version: '3.8'

services:
  fooddelivery-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7001:7001"
      - "80:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FoodDeliveryDB;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;
    depends_on:
      - sqlserver
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - fooddelivery-api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: YourPassword123!
      ACCEPT_EULA: Y
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
