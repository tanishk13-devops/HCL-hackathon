services:
  - type: web
    name: ziggy-api
    env: docker
    rootDir: food-delivery-app/backend
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: EnableSwagger
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: FoodDeliveryAPI
      - key: Jwt__Audience
        value: FoodDeliveryAPI.Client
      - key: CORS__ALLOWED_ORIGINS
        sync: false
