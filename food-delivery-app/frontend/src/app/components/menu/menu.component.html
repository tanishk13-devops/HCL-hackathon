<div class="menu-container">
  <h1>Restaurant Menu</h1>
  
  <div class="filters">
    <label>Filter by Category (client-side):</label>
    <select [(ngModel)]="selectedCategory" (change)="onCategoryChange()">
      <option value="">All Categories</option>
      <option *ngFor="let category of categories">{{ category }}</option>
    </select>
    <a routerLink="/cart" class="btn-add">Go To Cart</a>
  </div>

  <div *ngIf="loading" class="loading">Loading menu...</div>

  <div class="food-grid" *ngIf="!loading">
    <div *ngIf="filteredFoods.length === 0" class="no-items">No items available</div>
    <div class="food-card" *ngFor="let food of filteredFoods">
      <div class="food-image" [style.background-image]="'url(' + getFoodImage(food) + ')' "></div>
      <div class="food-details">
        <h3>{{ food.name }}</h3>
        <p class="category">{{ food.category?.name || food.categoryName || 'Category' }}</p>
        <p class="description">{{ food.description }}</p>
        <div class="footer">
          <span class="price">₹{{ food.price }}</span>
          <button (click)="addToCart(food)" [disabled]="food.isAvailable === false" class="btn-add">
            {{ food.isAvailable === false ? 'Out of Stock' : 'Add to Cart' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
