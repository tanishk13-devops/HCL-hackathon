<div class="tracking-container">
  <h1>Order Tracking</h1>

  <div *ngIf="loading" class="loading">Loading tracking details...</div>

  <div *ngIf="!loading && orders.length === 0" class="no-orders">
    No orders found for tracking.
    <a routerLink="/orders">Go to Orders</a>
  </div>

  <div class="tracking-list" *ngIf="!loading && orders.length > 0">
    <div class="track-card" *ngFor="let order of orders">
      <div class="track-header">
        <h3>Order #{{ order.id }}</h3>
        <span class="status">{{ order.status }}</span>
      </div>

      <div class="steps">
        <div class="step" *ngFor="let step of steps; let i = index" [class.done]="isStepDone(order.status, i)">
          <div class="dot">{{ i + 1 }}</div>
          <div class="label">{{ step }}</div>
        </div>
      </div>

      <div class="meta">
        <p><strong>Address:</strong> {{ order.address?.street }}, {{ order.address?.city }}</p>
        <p><strong>Total:</strong> ₹{{ order.totalAmount }}</p>
      </div>
    </div>
  </div>
</div>
