<footer class="premium-footer-wrap">
  <section class="premium-footer-card">
    <div class="footer-heading">
      <h2>{{ title }}</h2>
      <a class="phone-link" href="tel:9336519832" aria-label="Call phone number">
        <span class="material-symbols-rounded">call</span>
        <span>{{ phone }}</span>
      </a>
    </div>

    <div class="footer-actions">
      <a class="action-btn github" [href]="github" target="_blank" rel="noopener noreferrer" aria-label="Open GitHub profile">
        <span class="material-symbols-rounded">code</span>
        <span>GitHub</span>
      </a>

      <a class="action-btn linkedin" [href]="linkedIn" target="_blank" rel="noopener noreferrer" aria-label="Open LinkedIn profile">
        <span class="material-symbols-rounded">business_center</span>
        <span>LinkedIn</span>
      </a>

      <a class="action-btn email" [href]="email" aria-label="Send email">
        <span class="material-symbols-rounded">mail</span>
        <span>Email</span>
      </a>

      <a class="action-btn portfolio" [href]="portfolio" target="_blank" rel="noopener noreferrer" aria-label="Open portfolio">
        <span class="material-symbols-rounded">web</span>
        <span>Portfolio</span>
      </a>
    </div>
  </section>
</footer>
