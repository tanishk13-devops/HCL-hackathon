<div class="cart-container">
  <div class="cart-items-section">
    <h2>Shopping Cart</h2>
    <div *ngIf="cart.cartItems.length === 0" class="empty-cart">
      Your cart is empty
    </div>
    <table *ngIf="cart.cartItems.length > 0" class="cart-table">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cart.cartItems">
          <td>{{ item.foodItem?.name || ('Item #' + item.foodItemId) }}</td>
          <td>₹{{ item.price }}</td>
          <td>
            <input type="number" [(ngModel)]="item.quantity" (change)="updateQuantity(item.foodItemId, item.quantity)" min="1">
          </td>
          <td>₹{{ item.price * item.quantity }}</td>
          <td>
            <button (click)="removeItem(item.foodItemId)" class="btn-remove">Remove</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="cart.cartItems.length > 0" class="cart-summary">
      <p><strong>Total Items:</strong> {{ totalItems }}</p>
      <p><strong>Total Amount:</strong> ₹{{ totalAmount }}</p>
      <button class="btn-order" (click)="checkout()">Proceed to Checkout</button>
    </div>
  </div>
</div>
