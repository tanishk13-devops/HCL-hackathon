<div class="cart-container">
  <div class="cart-items-section">
    <h2>Shopping Cart</h2>
    <div *ngIf="cart.items.length === 0" class="empty-cart">
      Your cart is empty
    </div>
    <table *ngIf="cart.items.length > 0" class="cart-table">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cart.items">
          <td>{{ item.foodName }}</td>
          <td>₹{{ item.price }}</td>
          <td>
            <input type="number" [(ngModel)]="item.quantity" (change)="updateQuantity(item.foodId, item.quantity)" min="1">
          </td>
          <td>₹{{ item.subtotal }}</td>
          <td>
            <button (click)="removeItem(item.foodId)" class="btn-remove">Remove</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="cart.items.length > 0" class="cart-summary">
      <p><strong>Total Items:</strong> {{ cart.totalItems }}</p>
      <p><strong>Total Amount:</strong> ₹{{ cart.totalAmount }}</p>
    </div>
  </div>

  <div *ngIf="cart.items.length > 0" class="checkout-section">
    <h2>Checkout</h2>
    <form (ngSubmit)="placeOrder()">
      <div class="form-group">
        <label>Name:</label>
        <input type="text" [(ngModel)]="customerName" name="name" required>
      </div>
      <div class="form-group">
        <label>Phone:</label>
        <input type="tel" [(ngModel)]="customerPhone" name="phone" required>
      </div>
      <div class="form-group">
        <label>Delivery Address:</label>
        <textarea [(ngModel)]="customerAddress" name="address" required></textarea>
      </div>
      <div class="form-group">
        <label>Special Notes:</label>
        <textarea [(ngModel)]="specialNotes" name="notes"></textarea>
      </div>
      <button type="submit" [disabled]="loading" class="btn-order">
        {{ loading ? 'Placing Order...' : 'Place Order' }}
      </button>
    </form>
  </div>
</div>
