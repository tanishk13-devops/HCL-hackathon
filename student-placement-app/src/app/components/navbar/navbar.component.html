<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <a routerLink="/">📚 Online Bookstore</a>
    </div>

    <div class="nav-links">
      <a routerLink="/books" routerLinkActive="active">Browse Books</a>
      
      <ng-container *ngIf="currentUser">
        <a routerLink="/orders" routerLinkActive="active">My Orders</a>
        
        <a routerLink="/cart" routerLinkActive="active" class="cart-link">
          🛒 Cart
          <span class="cart-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
        </a>

        <a *ngIf="isAdmin()" routerLink="/admin" routerLinkActive="active">Admin</a>

        <div class="user-menu">
          <span class="user-name">{{ currentUser.firstName }}</span>
          <button class="btn btn-logout" (click)="logout()">Logout</button>
        </div>
      </ng-container>

      <ng-container *ngIf="!currentUser">
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active" class="btn btn-primary">Register</a>
      </ng-container>
    </div>
  </div>
</nav>
